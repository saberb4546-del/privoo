plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
}

import java.util.Properties

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

android {
    namespace 'com.mando.privoo'
    compileSdk 35
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId 'com.mando.privoo'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0'
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                def keystorePath = keystoreProperties.getProperty('storeFile')
                def keystoreFile = rootProject.file(keystorePath)
                if (!keystoreFile.exists()) {
                    keystoreFile = file("../${keystorePath}")
                }
                if (!keystoreFile.exists()) {
                    keystoreFile = file(keystorePath)
                }

                if (keystoreFile.exists()) {
                    keyAlias keystoreProperties.getProperty('keyAlias')
                    keyPassword keystoreProperties.getProperty('keyPassword')
                    storeFile keystoreFile
                    storePassword keystoreProperties.getProperty('storePassword')
                    println "✅ Using release keystore: ${keystoreFile.absolutePath}"
                } else {
                    println "⚠️ Keystore not found! Using debug signing."
                    keyAlias 'androiddebugkey'
                    keyPassword 'android'
                    storeFile file(System.getenv("HOME") + "/.android/debug.keystore")
                    storePassword 'android'
                }
            } else {
                println "⚠️ key.properties not found. Using debug signing."
                keyAlias 'androiddebugkey'
                keyPassword 'android'
                storeFile file(System.getenv("HOME") + "/.android/debug.keystore")
                storePassword 'android'
            }
        }
        debug {
            keyAlias 'androiddebugkey'
            keyPassword 'android'
            storeFile file(System.getenv("HOME") + "/.android/debug.keystore")
            storePassword 'android'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.3.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-config'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'androidx.multidex:multidex:2.0.1'
}
